<div class="mk-mp-d1 mk-mp-pinned highlighter-skip" id="mk-mp-d1">
    <div class="mk-mp-d1-audio-player">
        <div class="mk-mp-d1-controls-wrapper">
            <button class="mk-mp-d1-control-btn mk-mp-d1-play-pause" id="mk-mp-d1-play-pause">
                <i class="fas fa-play"></i>
            </button>

            <div class="mk-mp-d1-progress-section">
                <div class="mk-mp-d1-track-info">
                    <div class="mk-mp-d1-title">{{listen_to_article}}</div>
                    <div class="mk-mp-d1-time-info">
                        <span id="mk-mp-d1-current-time">0:00</span>
                        <span class="mk-mp-d1-separator">/</span>
                        <span id="mk-mp-d1-duration">0:00</span>
                    </div>
                </div>
                <div class="mk-mp-d1-progress-container">
                    <input type="range" class="mk-mp-d1-progress-bar" id="mk-mp-d1-progress-bar" value="0" step="0.1">
                </div>
                <div class="mk-mp-d1-signature">
                    AI Voice Generated by <a href="https://moknah.io" target="_blank">Moknah.io</a>
                </div>
            </div>

            <div class="mk-mp-d1-right-controls">
                <div class="mk-mp-d1-visualizer" id="mk-mp-d1-visualizer"></div>

                <!-- 🔊 Volume -->
                <div class="mk-mp-d1-volume-wrapper">
                    <i class="fas fa-volume-up mk-mp-d1-volume-icon" id="mk-mp-d1-volume-icon"></i>
                    <input type="range" class="mk-mp-d1-volume-slider" id="mk-mp-d1-volume-control" min="0" max="1" step="0.01" value="1">
                </div>

                <!-- ⚡ Speed Control -->
                <button class="mk-mp-d1-icon-btn" id="mk-mp-d1-speed-btn">1×</button>

                <button class="mk-mp-d1-icon-btn mk-mp-d1-pin-toggle" id="mk-mp-d1-pin-toggle">
                    <i class="fas fa-thumbtack"></i>
                </button>
            </div>
        </div>
    </div>

    <audio id="mk-mp-d1-audio" src="{{audio_url}}"></audio>
</div>
